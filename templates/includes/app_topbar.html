{% load static %}
<header class="app-topbar">
  <div class="app-topbar-inner">
    <a href="{% url 'accounts:dashboard' %}" class="brand" style="display: flex; align-items: center; gap: 8px;">
      <img src="{% static 'img/lautech-logo.png' %}" alt="Logo" style="height: 32px; width: auto;">
      <div>
        <span class="brand-mark">LAUTECH</span>
        <span class="brand-name">Library</span>
      </div>
    </a>

    <nav class="app-topbar-nav" aria-label="Main navigation">
      <a href="{% url 'accounts:dashboard' %}" class="app-nav-link{% if nav_active == 'dashboard' %} is-active{% endif %}">Dashboard</a>
      <a href="{% url 'catalog:book_list' %}" class="app-nav-link{% if nav_active == 'catalogue' %} is-active{% endif %}">Catalogue</a>
      {% if not user.is_librarian %}
      <a href="{% url 'circulation:my_loans' %}" class="app-nav-link{% if nav_active == 'loans' %} is-active{% endif %}">My Loans</a>
      {% endif %}
      <a href="{% url 'accounts:profile' %}" class="app-nav-link{% if nav_active == 'profile' %} is-active{% endif %}">Profile</a>
    </nav>

    <form method="get" action="{% url 'catalog:book_list' %}" class="app-search" role="search">
      <span class="app-search-icon" aria-hidden="true">🔍</span>
      <input type="search" name="q" placeholder="Search resources…" class="app-search-input" value="{{ search_query|default:'' }}">
    </form>

    <div class="app-topbar-user">
      <div class="app-user-meta">
        <span class="app-user-matric">{{ user.matric_no }}</span>
        <span class="app-user-role">{{ user.get_role_display|upper }}</span>
      </div>
      <div class="app-user-avatar" aria-hidden="true">{{ user.first_name|slice:":1"|upper }}{{ user.last_name|slice:":1"|upper }}</div>
      <button type="button" class="theme-toggle" aria-label="Toggle dark/light theme">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
      <form method="post" action="{% url 'accounts:logout' %}" class="app-logout-form">
        {% csrf_token %}
        <button type="submit" class="app-logout-btn">Sign Out</button>
      </form>
    </div>
  </div>
</header>
